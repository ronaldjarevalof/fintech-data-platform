name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  # ── Job 1: tests unitarios (rápido, sin base de datos) ─────────────────────
  unit-tests:
    name: Unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run pytest with coverage
        run: pytest --cov=src --cov-report=term-missing tests/ -v

  # ── Job 2: valida que el Dockerfile y docker-compose.yml construyen ─────────
  docker-build:
    name: Docker build validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Create .env from example
        run: cp .env.example .env

      - name: Validate Docker image builds
        run: docker compose build etl

  # ── Job 3: smoke test completo del pipeline (con Postgres) ─────────────────
  pipeline-smoke:
    name: Pipeline smoke test
    runs-on: ubuntu-latest
    needs: [unit-tests, docker-build]

    # Si el secret POSTGRES_PASSWORD está configurado en el repo se usa;
    # si no (fork sin secrets), cae al valor por defecto 'fintech'.
    env:
      POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD || 'fintech' }}

    services:
      postgres:
        image: postgres:18
        env:
          POSTGRES_DB: fintech
          POSTGRES_USER: etl_user
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD || 'fintech' }}
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U etl_user -d fintech"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    steps:
      - uses: actions/checkout@v4

      - name: Install PostgreSQL client
        run: sudo apt-get install -y postgresql-client

      - name: Init database (DDL + vistas + roles)
        env:
          PGPASSWORD: ${{ env.POSTGRES_PASSWORD }}
        run: |
          for f in $(ls sql/*.sql | sort); do
            echo "▶ $f"
            psql -h localhost -U etl_user -d fintech -f "$f"
          done

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run ETL pipeline
        env:
          POSTGRES_HOST: localhost
          POSTGRES_PORT: 5432
          POSTGRES_DB: fintech
          POSTGRES_USER: etl_user
          POSTGRES_PASSWORD: ${{ env.POSTGRES_PASSWORD }}
          DATA_RAW_PATH: ${{ github.workspace }}/data/raw
          LOG_LEVEL: INFO
          FECHA_CORTE: auto
        run: python -m src.main

      - name: Verify pipeline results
        env:
          PGPASSWORD: ${{ env.POSTGRES_PASSWORD }}
        run: |
          echo "=== ETL run ==="
          psql -h localhost -U etl_user -d fintech -c \
            "SELECT run_id, status, filas_dq_errors, filas_fact_credito, filas_fact_pago
             FROM dq.etl_runs ORDER BY started_at DESC LIMIT 1;"

          echo "=== Verificar status = SUCCESS ==="
          STATUS=$(psql -h localhost -U etl_user -d fintech -t -A -c \
            "SELECT status FROM dq.etl_runs ORDER BY started_at DESC LIMIT 1;")
          [ "$STATUS" = "SUCCESS" ] || { echo "FAIL: status=$STATUS"; exit 1; }

          echo "=== DQ errors por regla ==="
          psql -h localhost -U etl_user -d fintech -c \
            "SELECT regla_id, tabla_origen, severidad, COUNT(*) AS n
             FROM dq.dq_errors GROUP BY 1,2,3 ORDER BY 1;"

          echo "=== Verificar registros aislados (DQ-1 a DQ-6) entre 10 y 15 ==="
          DQ=$(psql -h localhost -U etl_user -d fintech -t -A -c \
            "SELECT COUNT(*) FROM dq.dq_errors WHERE regla_id != 'DQ-7';")
          [ "$DQ" -ge 10 ] && [ "$DQ" -le 15 ] \
            || { echo "FAIL: dq_errors_aislados=$DQ, esperado 10-15"; exit 1; }

          echo "=== KPI resumen ==="
          psql -h localhost -U etl_user -d fintech -c \
            "SELECT * FROM bi.vw_kpi_resumen;"

          echo "✓ Pipeline verificado: status=SUCCESS, dq_errors_aislados=$DQ"
